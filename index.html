<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    #denied {
      display: flex; align-items: center; justify-content: center;
      height: 80vh; font-size: 2rem; color: #1e293b;
    }
    #app { display: none; max-width: 440px; width: 100%; }
    .loading { text-align: center; padding: 3rem; color: #475569; font-size: 1.1rem; }
    .error { text-align: center; padding: 3rem; color: #f43f5e; font-size: 1.1rem; }

    .status-card {
      border-radius: 20px;
      padding: 2.25rem 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .status-card.green {
      background: linear-gradient(135deg, #059669, #10b981, #34d399);
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.3);
    }
    .status-card.red {
      background: linear-gradient(135deg, #e11d48, #f43f5e, #fb7185);
      box-shadow: 0 8px 30px rgba(244, 63, 94, 0.3);
    }
    .status-label {
      font-size: 1.2rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 0.75rem;
      color: rgba(255,255,255,0.85);
    }
    #timer {
      font-size: 2.4rem; font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    .btn {
      width: 100%;
      padding: 1.3rem;
      font-size: 1.38rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 2rem;
    }
    .btn.green-btn {
      background: #10b981;
      color: #fff;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }
    .btn.green-btn:active { opacity: 0.8; }
    .btn.red-btn {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
    }

    .log-section {
      background: #1e293b;
      border-radius: 16px;
      padding: 1.1rem 1.25rem;
    }
    .log-section h2 {
      font-size: 0.96rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #475569;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2d3a4f;
    }
    .log-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0;
      border-bottom: 1px solid #252f3f;
      font-size: 1.14rem;
    }
    .log-entry .log-date { color: #94a3b8; }
    .log-entry .log-ago { color: #475569; font-size: 1.02rem; }
    .log-entry:last-child { border-bottom: none; }
    .empty-log { color: #475569; font-style: italic; padding: 1rem 0; font-size: 1.14rem; }
    .delete-btn {
      background: none; border: none; color: #475569;
      cursor: pointer; font-size: 1.02rem; padding: 0.3rem 0.5rem;
      border-radius: 4px; margin-left: 0.5rem;
    }
    .delete-btn:active { color: #f43f5e; }
    .first-time {
      text-align: center; padding: 2.5rem 1.5rem;
      background: #1e293b; border-radius: 20px;
      margin-bottom: 1.25rem;
    }
    .first-time h2 { margin-bottom: 0.75rem; font-size: 1.56rem; font-weight: 600; color: #e2e8f0; }
    .first-time p { color: #94a3b8; margin-bottom: 1rem; font-size: 1.2rem; }
  </style>
</head>
<body>

<div id="denied"><span>404</span></div>
<div id="app"></div>

<script>
const SECRET = 'x9f2k7m4-b8c1-e3a5-d6w0-q7r9s2t4u1v8';
const INTERVAL_MS = 3.5 * 24 * 60 * 60 * 1000;

let entries = [];
const API_KEY = `?k=${SECRET}`;

const params = new URLSearchParams(window.location.search);
if (params.get('k') !== SECRET) {
  document.getElementById('denied').style.display = 'flex';
} else {
  document.getElementById('denied').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = '<div class="loading">Loading...</div>';
  init();
}

async function init() {
  try {
    const res = await fetch('/api/entries' + API_KEY);
    if (!res.ok) throw new Error('Server error ' + res.status);
    entries = await res.json();
    renderFull();
    setInterval(tickTimer, 1000);
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="error">Failed to load: ' + e.message + '</div>';
  }
}

let saving = false;

async function logEntry() {
  if (saving) return;
  saving = true;
  const btn = document.querySelector('.green-btn');
  if (btn) { btn.textContent = 'Saving...'; btn.style.opacity = '0.6'; }
  try {
    const res = await fetch('/api/entries' + API_KEY, { method: 'POST' });
    if (!res.ok) throw new Error('Failed');
    const entry = await res.json();
    entries.push(entry);
    renderFull();
  } catch(e) {
    if (btn) { btn.textContent = 'Failed — tap to retry'; btn.style.opacity = '1'; }
  }
  saving = false;
}

async function deleteEntry(id, index) {
  const original = [...entries];
  entries.splice(index, 1);
  renderFull();
  try {
    const res = await fetch('/api/entries/' + id + API_KEY, { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed');
  } catch(e) {
    entries = original;
    renderFull();
  }
}

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const p = n => String(n).padStart(2, '0');
  if (d > 0) return `${d}d ${h}h ${p(m)}m ${p(sec)}s`;
  if (h > 0) return `${h}h ${p(m)}m ${p(sec)}s`;
  return `${m}m ${p(sec)}s`;
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  }) + ', ' + d.toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', hour12: true
  });
}

function ago(ts) {
  const ms = Date.now() - ts;
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d > 0) return `${d}d ${h}h ago`;
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m ago`;
  return `${m}m ago`;
}

// Only updates the timer text — no DOM rebuild
function tickTimer() {
  const el = document.getElementById('timer');
  if (!el || !entries.length) return;
  const last = entries[entries.length - 1];
  const elapsed = Date.now() - last.ts;
  if (elapsed >= INTERVAL_MS) {
    el.textContent = fmt(elapsed) + ' elapsed';
    // Switch card to green if it was red
    const card = el.closest('.status-card');
    if (card && card.classList.contains('red')) renderFull();
  } else {
    el.textContent = fmt(INTERVAL_MS - elapsed);
  }
}

// Full rebuild — only on data changes
function renderFull() {
  const app = document.getElementById('app');
  const last = entries.length > 0 ? entries[entries.length - 1] : null;
  let html = '';

  if (!last) {
    html += `
      <div class="first-time">
        <h2>Tic Tac Tracker</h2>
        <p>Twice a week, every 3.5 days.<br>Tap below when you take one.</p>
      </div>
      <button class="btn green-btn" onclick="logEntry()">I took a Tic Tac</button>`;
  } else {
    const elapsed = Date.now() - last.ts;
    if (elapsed >= INTERVAL_MS) {
      html += `
        <div class="status-card green">
          <div class="status-label">Ready</div>
          <div id="timer">${fmt(elapsed)} elapsed</div>
        </div>
        <button class="btn green-btn" onclick="logEntry()">I took a Tic Tac</button>`;
    } else {
      html += `
        <div class="status-card red">
          <div class="status-label">Next tic tac in</div>
          <div id="timer">${fmt(INTERVAL_MS - elapsed)}</div>
        </div>
        <button class="btn red-btn" disabled>Not yet</button>`;
    }
  }

  html += '<div class="log-section"><h2>History</h2>';
  if (!entries.length) {
    html += '<div class="empty-log">No entries yet.</div>';
  } else {
    for (let i = entries.length - 1; i >= 0; i--) {
      const e = entries[i];
      html += `
        <div class="log-entry">
          <span class="log-date">${fmtDate(e.ts)}</span>
          <span>
            <span class="log-ago">${ago(e.ts)}</span>
            <button class="delete-btn" onclick="deleteEntry(${e.id},${i})">✕</button>
          </span>
        </div>`;
    }
  }
  html += '</div>';

  // Theme switcher
  html += `
    <div style="display:flex;gap:0.5rem;margin-top:1.5rem;justify-content:center;">
      <button onclick="setTheme('A')" style="padding:0.5rem 1.2rem;border-radius:8px;border:none;font-weight:600;font-size:1rem;cursor:pointer;background:#0e7490;color:#fff;">A</button>
      <button onclick="setTheme('B')" style="padding:0.5rem 1.2rem;border-radius:8px;border:none;font-weight:600;font-size:1rem;cursor:pointer;background:#7c3aed;color:#fff;">B</button>
      <button onclick="setTheme('C')" style="padding:0.5rem 1.2rem;border-radius:8px;border:none;font-weight:600;font-size:1rem;cursor:pointer;background:#ea580c;color:#fff;">C</button>
    </div>`;

  app.innerHTML = html;
}

const themes = {
  A: { // Ocean
    bg: '#0c1222',
    cardBg: '#152238',
    text: '#cbd5e1',
    muted: '#64748b',
    dimmed: '#475569',
    border: '#1e3a5f',
    greenGrad: 'linear-gradient(135deg, #0d9488, #14b8a6, #2dd4bf)',
    greenSolid: '#14b8a6',
    greenShadow: 'rgba(20, 184, 166, 0.35)',
    greenBtnShadow: 'rgba(20, 184, 166, 0.4)',
    redGrad: 'linear-gradient(135deg, #0369a1, #0284c7, #38bdf8)',
    redShadow: 'rgba(56, 189, 248, 0.3)',
    disabledBg: '#152238',
    disabledColor: '#475569',
  },
  B: { // Midnight Purple
    bg: '#13111c',
    cardBg: '#1e1b2e',
    text: '#d4d0e8',
    muted: '#8b83a8',
    dimmed: '#5b5478',
    border: '#2a2545',
    greenGrad: 'linear-gradient(135deg, #059669, #10b981, #34d399)',
    greenSolid: '#10b981',
    greenShadow: 'rgba(16, 185, 129, 0.35)',
    greenBtnShadow: 'rgba(16, 185, 129, 0.4)',
    redGrad: 'linear-gradient(135deg, #7c3aed, #8b5cf6, #a78bfa)',
    redShadow: 'rgba(139, 92, 246, 0.3)',
    disabledBg: '#1e1b2e',
    disabledColor: '#5b5478',
  },
  C: { // Warm Dark
    bg: '#1a1a1a',
    cardBg: '#2a2a2a',
    text: '#d4d4d4',
    muted: '#a3a3a3',
    dimmed: '#6b6b6b',
    border: '#3a3a3a',
    greenGrad: 'linear-gradient(135deg, #059669, #10b981, #34d399)',
    greenSolid: '#10b981',
    greenShadow: 'rgba(16, 185, 129, 0.35)',
    greenBtnShadow: 'rgba(16, 185, 129, 0.4)',
    redGrad: 'linear-gradient(135deg, #c2410c, #ea580c, #fb923c)',
    redShadow: 'rgba(234, 88, 12, 0.3)',
    disabledBg: '#2a2a2a',
    disabledColor: '#6b6b6b',
  }
};

function setTheme(key) {
  const t = themes[key];
  if (!t) return;
  document.body.style.background = t.bg;
  document.body.style.color = t.text;

  const card = document.querySelector('.status-card');
  if (card) {
    if (card.classList.contains('green')) {
      card.style.background = t.greenGrad;
      card.style.boxShadow = '0 8px 30px ' + t.greenShadow;
    } else {
      card.style.background = t.redGrad;
      card.style.boxShadow = '0 8px 30px ' + t.redShadow;
    }
  }

  const greenBtn = document.querySelector('.green-btn');
  if (greenBtn) {
    greenBtn.style.background = t.greenSolid;
    greenBtn.style.boxShadow = '0 4px 20px ' + t.greenBtnShadow;
  }
  const redBtn = document.querySelector('.red-btn');
  if (redBtn) {
    redBtn.style.background = t.disabledBg;
    redBtn.style.color = t.disabledColor;
  }

  const logSection = document.querySelector('.log-section');
  if (logSection) {
    logSection.style.background = t.cardBg;
  }
  const logH2 = document.querySelector('.log-section h2');
  if (logH2) {
    logH2.style.color = t.dimmed;
    logH2.style.borderBottomColor = t.border;
  }
  document.querySelectorAll('.log-entry').forEach(el => {
    el.style.borderBottomColor = t.border;
  });
  document.querySelectorAll('.log-date').forEach(el => {
    el.style.color = t.muted;
  });
  document.querySelectorAll('.log-ago').forEach(el => {
    el.style.color = t.dimmed;
  });
  document.querySelectorAll('.delete-btn').forEach(el => {
    el.style.color = t.dimmed;
  });

  localStorage.setItem('tictac-theme', key);
}
</script>
</body>
</html>
