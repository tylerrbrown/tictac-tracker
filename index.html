<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #d4d4d4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    #app { max-width: 440px; width: 100%; }
    .loading { text-align: center; padding: 3rem; color: #475569; font-size: 1.1rem; }
    .error { text-align: center; padding: 3rem; color: #f43f5e; font-size: 1.1rem; }

    /* ── Landing page ── */
    .landing-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .landing-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e5e5e5;
      margin-bottom: 0.25rem;
    }
    .landing-header p {
      color: #6b6b6b;
      font-size: 0.95rem;
    }
    .tracker-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .tracker-card {
      background: #2a2a2a;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: transform 0.1s;
      text-decoration: none;
      display: block;
    }
    .tracker-card:active { transform: scale(0.98); }
    .tracker-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .tracker-card-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e5e5e5;
    }
    .tracker-card-color {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tracker-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      color: #6b6b6b;
    }
    .tracker-card-status {
      font-weight: 600;
      font-size: 0.88rem;
    }
    .tracker-card-status.ready { color: #10b981; }
    .tracker-card-status.waiting { color: #f59e0b; }
    .tracker-card-status.no-entries { color: #6b6b6b; }
    .landing-empty {
      text-align: center;
      padding: 3rem;
      color: #6b6b6b;
    }

    /* ── Tracker page ── */
    .status-card {
      border-radius: 20px;
      padding: 2.25rem 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .status-card.green {
      background: linear-gradient(135deg, #059669, #10b981, #34d399);
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.3);
    }
    .status-label {
      font-size: 1.2rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 0.75rem;
      color: rgba(255,255,255,0.85);
    }
    #timer {
      font-size: 2.4rem; font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }
    .btn {
      width: 100%;
      padding: 1.3rem;
      font-size: 1.38rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 2rem;
    }
    .btn.green-btn {
      background: #10b981;
      color: #fff;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }
    .btn.green-btn:active { opacity: 0.8; }
    .btn.red-btn {
      background: #2a2a2a;
      color: #6b6b6b;
      cursor: not-allowed;
    }
    .log-section {
      background: #2a2a2a;
      border-radius: 16px;
      padding: 1.1rem 1.25rem;
    }
    .log-section h2 {
      font-size: 0.96rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6b6b6b;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #3a3a3a;
    }
    .log-entry {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.7rem 0;
      border-bottom: 1px solid #3a3a3a;
      font-size: 1.14rem;
    }
    .log-entry .log-date { color: #a3a3a3; white-space: nowrap; font-size: 0.95rem; }
    .log-entry .log-right { display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; margin-left: 0.75rem; }
    .log-entry .log-ago { color: #6b6b6b; font-size: 0.9rem; }
    .log-entry:last-child { border-bottom: none; }
    .empty-log { color: #6b6b6b; font-style: italic; padding: 1rem 0; font-size: 1.14rem; }
    .delete-btn {
      background: none; border: none; color: #6b6b6b;
      cursor: pointer; font-size: 1.02rem; padding: 0.3rem 0.5rem;
      border-radius: 4px; margin-left: 0.5rem;
    }
    .delete-btn:active { color: #f43f5e; }
    .first-time {
      text-align: center; padding: 2.5rem 1.5rem;
      background: #2a2a2a; border-radius: 20px;
      margin-bottom: 1.25rem;
    }
    .first-time h2 { margin-bottom: 0.75rem; font-size: 1.56rem; font-weight: 600; color: #d4d4d4; }
    .first-time p { color: #a3a3a3; margin-bottom: 1rem; font-size: 1.2rem; }
    .back-link {
      display: inline-block;
      color: #6b6b6b;
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .back-link:hover { color: #a3a3a3; }
  </style>
</head>
<body>

<div id="app"><div class="loading">Loading...</div></div>

<script>
const params = new URLSearchParams(window.location.search);
const trackerSlug = params.get('name');

const COLORS = {
  red:     { grad: 'linear-gradient(135deg, #b91c1c, #dc2626, #ef4444)', shadow: 'rgba(220, 38, 38, 0.3)', btn: '#dc2626', btnShadow: 'rgba(220, 38, 38, 0.4)', dot: '#dc2626' },
  orange:  { grad: 'linear-gradient(135deg, #c2410c, #ea580c, #fb923c)', shadow: 'rgba(234, 88, 12, 0.3)', btn: '#ea580c', btnShadow: 'rgba(234, 88, 12, 0.4)', dot: '#ea580c' },
  yellow:  { grad: 'linear-gradient(135deg, #a16207, #ca8a04, #facc15)', shadow: 'rgba(202, 138, 4, 0.3)', btn: '#ca8a04', btnShadow: 'rgba(202, 138, 4, 0.4)', dot: '#ca8a04' },
  lime:    { grad: 'linear-gradient(135deg, #4d7c0f, #65a30d, #a3e635)', shadow: 'rgba(101, 163, 13, 0.3)', btn: '#65a30d', btnShadow: 'rgba(101, 163, 13, 0.4)', dot: '#65a30d' },
  green:   { grad: 'linear-gradient(135deg, #15803d, #22c55e, #4ade80)', shadow: 'rgba(34, 197, 94, 0.3)', btn: '#22c55e', btnShadow: 'rgba(34, 197, 94, 0.4)', dot: '#22c55e' },
  teal:    { grad: 'linear-gradient(135deg, #0d9488, #14b8a6, #2dd4bf)', shadow: 'rgba(20, 184, 166, 0.3)', btn: '#14b8a6', btnShadow: 'rgba(20, 184, 166, 0.4)', dot: '#14b8a6' },
  cyan:    { grad: 'linear-gradient(135deg, #0e7490, #06b6d4, #22d3ee)', shadow: 'rgba(6, 182, 212, 0.3)', btn: '#06b6d4', btnShadow: 'rgba(6, 182, 212, 0.4)', dot: '#06b6d4' },
  blue:    { grad: 'linear-gradient(135deg, #1d4ed8, #3b82f6, #60a5fa)', shadow: 'rgba(59, 130, 246, 0.3)', btn: '#3b82f6', btnShadow: 'rgba(59, 130, 246, 0.4)', dot: '#3b82f6' },
  indigo:  { grad: 'linear-gradient(135deg, #4338ca, #6366f1, #818cf8)', shadow: 'rgba(99, 102, 241, 0.3)', btn: '#6366f1', btnShadow: 'rgba(99, 102, 241, 0.4)', dot: '#6366f1' },
  purple:  { grad: 'linear-gradient(135deg, #7c3aed, #8b5cf6, #a78bfa)', shadow: 'rgba(139, 92, 246, 0.3)', btn: '#8b5cf6', btnShadow: 'rgba(139, 92, 246, 0.4)', dot: '#8b5cf6' },
  pink:    { grad: 'linear-gradient(135deg, #be185d, #ec4899, #f472b6)', shadow: 'rgba(236, 72, 153, 0.3)', btn: '#ec4899', btnShadow: 'rgba(236, 72, 153, 0.4)', dot: '#ec4899' },
  rose:    { grad: 'linear-gradient(135deg, #be123c, #f43f5e, #fb7185)', shadow: 'rgba(244, 63, 94, 0.3)', btn: '#f43f5e', btnShadow: 'rgba(244, 63, 94, 0.4)', dot: '#f43f5e' },
  gray:    { grad: 'linear-gradient(135deg, #374151, #6b7280, #9ca3af)', shadow: 'rgba(107, 114, 128, 0.3)', btn: '#6b7280', btnShadow: 'rgba(107, 114, 128, 0.4)', dot: '#6b7280' },
  brown:   { grad: 'linear-gradient(135deg, #78350f, #92400e, #b45309)', shadow: 'rgba(146, 64, 14, 0.3)', btn: '#92400e', btnShadow: 'rgba(146, 64, 14, 0.4)', dot: '#92400e' },
  gold:    { grad: 'linear-gradient(135deg, #92400e, #d97706, #fbbf24)', shadow: 'rgba(217, 119, 6, 0.3)', btn: '#d97706', btnShadow: 'rgba(217, 119, 6, 0.4)', dot: '#d97706' },
};

function parseInterval(str) {
  const m = str.match(/^([\d.]+)\s*(d|h|m|w)$/i);
  if (!m) return 3.5 * 24 * 60 * 60 * 1000;
  const val = parseFloat(m[1]);
  switch (m[2].toLowerCase()) {
    case 'w': return val * 7 * 24 * 60 * 60 * 1000;
    case 'd': return val * 24 * 60 * 60 * 1000;
    case 'h': return val * 60 * 60 * 1000;
    case 'm': return val * 60 * 1000;
    default: return val * 24 * 60 * 60 * 1000;
  }
}

function fmtIntervalStr(str) {
  const ms = parseInterval(str);
  const days = ms / (24 * 60 * 60 * 1000);
  if (days >= 7 && days % 7 === 0) return (days / 7) + (days / 7 === 1 ? ' week' : ' weeks');
  if (days >= 1) return days + (days === 1 ? ' day' : ' days');
  const hours = ms / (60 * 60 * 1000);
  if (hours >= 1) return hours + (hours === 1 ? ' hour' : ' hours');
  const mins = ms / (60 * 1000);
  return mins + (mins === 1 ? ' minute' : ' minutes');
}

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const p = n => String(n).padStart(2, '0');
  if (d > 0) return `${d}d ${h}h ${p(m)}m ${p(sec)}s`;
  if (h > 0) return `${h}h ${p(m)}m ${p(sec)}s`;
  return `${m}m ${p(sec)}s`;
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  }) + ', ' + d.toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', hour12: true
  });
}

function ago(ts) {
  const ms = Date.now() - ts;
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d > 0) return `${d}d ${h}h ago`;
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m ago`;
  return `${m}m ago`;
}

// ── SSE setup ──
let evtSource = null;
function setupSSE(onEvent) {
  evtSource = new EventSource('/api/events');
  evtSource.onopen = () => {};
  evtSource.onerror = () => {};
  evtSource.addEventListener('entry-added', onEvent);
  evtSource.addEventListener('entry-deleted', onEvent);
  evtSource.addEventListener('entry-updated', onEvent);
  evtSource.addEventListener('entries-cleared', onEvent);
  evtSource.addEventListener('tracker-created', onEvent);
  evtSource.addEventListener('tracker-updated', onEvent);
  evtSource.addEventListener('tracker-deleted', onEvent);
  evtSource.addEventListener('db-restored', onEvent);
}

// ── Decide mode ──
if (trackerSlug) {
  initTrackerPage(trackerSlug);
} else {
  initLandingPage();
}

// ═══════════════════════════════════════════════════════════
// LANDING PAGE
// ═══════════════════════════════════════════════════════════
async function initLandingPage() {
  document.title = 'Tic Tac Tracker';
  try {
    const res = await fetch('/api/trackers');
    if (!res.ok) throw new Error('Server error ' + res.status);
    let trackers = await res.json();
    renderLanding(trackers);

    // SSE: refresh on any change
    setupSSE(async () => {
      const r = await fetch('/api/trackers');
      if (r.ok) {
        trackers = await r.json();
        renderLanding(trackers);
      }
    });

    // Update ago times on landing
    setInterval(() => {
      document.querySelectorAll('[data-last-entry]').forEach(el => {
        const ts = parseInt(el.dataset.lastEntry);
        if (ts) el.textContent = ago(ts);
      });
    }, 1000);
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="error">Failed to load: ' + e.message + '</div>';
  }
}

function renderLanding(trackers) {
  const app = document.getElementById('app');
  let html = '<div class="landing-header"><h1>Tic Tac Tracker</h1><p>Your trackers</p></div>';

  if (!trackers.length) {
    html += '<div class="landing-empty">No trackers yet. Create one from the admin page.</div>';
  } else {
    html += '<div class="tracker-grid">';
    for (const t of trackers) {
      const cc = COLORS[t.color] || COLORS.orange;
      const intervalMs = parseInterval(t.interval);
      let statusHtml = '';
      if (!t.last_entry) {
        statusHtml = '<span class="tracker-card-status no-entries">No entries</span>';
      } else {
        const elapsed = Date.now() - t.last_entry;
        if (elapsed >= intervalMs) {
          statusHtml = '<span class="tracker-card-status ready">Ready</span>';
        } else {
          statusHtml = `<span class="tracker-card-status waiting">${fmt(intervalMs - elapsed)}</span>`;
        }
      }
      html += `
        <a class="tracker-card" href="/?name=${encodeURIComponent(t.slug)}">
          <div class="tracker-card-top">
            <span class="tracker-card-name">${esc(t.display_name)}</span>
            <span class="tracker-card-color" style="background:${cc.dot}"></span>
          </div>
          <div class="tracker-card-meta">
            <span>Every ${fmtIntervalStr(t.interval)} &middot; ${t.entry_count} entries</span>
            ${statusHtml}
          </div>
        </a>`;
    }
    html += '</div>';
  }
  app.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// TRACKER PAGE
// ═══════════════════════════════════════════════════════════
let trackerConfig = null;
let entries = [];
let INTERVAL_MS = 0;
let CC = COLORS.orange;
let saving = false;

async function initTrackerPage(slug) {
  const app = document.getElementById('app');
  try {
    // Load tracker config
    const cfgRes = await fetch(`/api/tracker/${encodeURIComponent(slug)}`);
    if (!cfgRes.ok) {
      if (cfgRes.status === 404) {
        app.innerHTML = '<div class="error">Tracker not found.</div>';
        return;
      }
      throw new Error('Server error ' + cfgRes.status);
    }
    trackerConfig = await cfgRes.json();
    INTERVAL_MS = parseInterval(trackerConfig.interval);
    CC = COLORS[trackerConfig.color] || COLORS.orange;
    document.title = trackerConfig.display_name + ' Tracker';

    // Load entries
    const res = await fetch(`/api/entries?name=${encodeURIComponent(slug)}`);
    if (!res.ok) throw new Error('Server error ' + res.status);
    entries = await res.json();
    renderTracker();
    setInterval(tickTimer, 1000);

    // SSE: refresh on relevant changes
    setupSSE(async (evt) => {
      const data = JSON.parse(evt.data);
      if (evt.type === 'db-restored' ||
          evt.type === 'tracker-updated' && (data.slug === slug || data.old_slug === slug)) {
        // Reload everything — config may have changed
        const cr = await fetch(`/api/tracker/${encodeURIComponent(data.slug || slug)}`);
        if (cr.ok) {
          trackerConfig = await cr.json();
          INTERVAL_MS = parseInterval(trackerConfig.interval);
          CC = COLORS[trackerConfig.color] || COLORS.orange;
          document.title = trackerConfig.display_name + ' Tracker';
          // If slug changed, update URL
          if (data.slug && data.slug !== slug) {
            window.history.replaceState(null, '', '/?name=' + encodeURIComponent(data.slug));
          }
        }
        const er = await fetch(`/api/entries?name=${encodeURIComponent(data.slug || slug)}`);
        if (er.ok) { entries = await er.json(); renderTracker(); }
      } else if (data.tracker === slug || evt.type === 'db-restored') {
        // Entry change for this tracker — reload entries
        const er = await fetch(`/api/entries?name=${encodeURIComponent(slug)}`);
        if (er.ok) { entries = await er.json(); renderTracker(); }
      } else if (evt.type === 'tracker-deleted' && data.slug === slug) {
        app.innerHTML = '<div class="error">This tracker was deleted.</div>';
        if (evtSource) evtSource.close();
      }
    });
  } catch (e) {
    app.innerHTML = '<div class="error">Failed to load: ' + e.message + '</div>';
  }
}

// Make logEntry and deleteEntry global for onclick
window.logEntry = async function() {
  if (saving) return;
  saving = true;
  const btn = document.querySelector('.green-btn');
  if (btn) { btn.textContent = 'Saving...'; btn.style.opacity = '0.6'; }
  try {
    const res = await fetch(`/api/entries?name=${encodeURIComponent(trackerSlug)}`, { method: 'POST' });
    if (!res.ok) throw new Error('Failed');
    const entry = await res.json();
    entries.push(entry);
    renderTracker();
  } catch(e) {
    if (btn) { btn.textContent = 'Failed \u2014 tap to retry'; btn.style.opacity = '1'; }
  }
  saving = false;
};

window.deleteEntry = async function(id, index) {
  const original = [...entries];
  entries.splice(index, 1);
  renderTracker();
  try {
    const res = await fetch(`/api/entries/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed');
  } catch(e) {
    entries = original;
    renderTracker();
  }
};

function tickTimer() {
  const el = document.getElementById('timer');
  if (!el || !entries.length) return;
  const last = entries[entries.length - 1];
  const elapsed = Date.now() - last.ts;
  if (elapsed >= INTERVAL_MS) {
    el.textContent = fmt(elapsed) + ' elapsed';
    const card = el.closest('.status-card');
    if (card && card.classList.contains('wait')) renderTracker();
  } else {
    el.textContent = fmt(INTERVAL_MS - elapsed);
  }
  document.querySelectorAll('.log-ago').forEach((el, idx) => {
    const e = entries[entries.length - 1 - idx];
    if (e) el.textContent = ago(e.ts);
  });
}

function renderTracker() {
  const app = document.getElementById('app');
  const last = entries.length > 0 ? entries[entries.length - 1] : null;
  const name = trackerConfig ? trackerConfig.display_name : trackerSlug;
  let html = '<a class="back-link" href="/">&larr; All Trackers</a>';

  if (!last) {
    html += `
      <div class="first-time">
        <h2>${esc(name)} Tracker</h2>
        <p>Every ${fmtIntervalStr(trackerConfig ? trackerConfig.interval : '3.5d')}.<br>Tap below when you take one.</p>
      </div>
      <button class="btn green-btn" style="background:${CC.btn};box-shadow:0 4px 20px ${CC.btnShadow}" onclick="logEntry()">I took a ${esc(name)}</button>`;
  } else {
    const elapsed = Date.now() - last.ts;
    if (elapsed >= INTERVAL_MS) {
      html += `
        <div class="status-card green">
          <div class="status-label">Ready</div>
          <div id="timer">${fmt(elapsed)} elapsed</div>
        </div>
        <button class="btn green-btn" style="background:${CC.btn};box-shadow:0 4px 20px ${CC.btnShadow}" onclick="logEntry()">I took a ${esc(name)}</button>`;
    } else {
      html += `
        <div class="status-card wait" style="background:${CC.grad};box-shadow:0 8px 30px ${CC.shadow}">
          <div class="status-label">Next ${esc(name)} in</div>
          <div id="timer">${fmt(INTERVAL_MS - elapsed)}</div>
        </div>
        <button class="btn red-btn" disabled>Not yet</button>`;
    }
  }

  html += '<div class="log-section"><h2>History</h2>';
  if (!entries.length) {
    html += '<div class="empty-log">No entries yet.</div>';
  } else {
    for (let i = entries.length - 1; i >= 0; i--) {
      const e = entries[i];
      html += `
        <div class="log-entry">
          <span class="log-date">${fmtDate(e.ts)}</span>
          <span class="log-right">
            <span class="log-ago">${ago(e.ts)}</span>
            <button class="delete-btn" onclick="deleteEntry(${e.id},${i})">&#10005;</button>
          </span>
        </div>`;
    }
  }
  html += '</div>';
  app.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
