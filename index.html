<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #ddd;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    #denied {
      display: flex; align-items: center; justify-content: center;
      height: 80vh; font-size: 2rem; color: #222;
    }
    #app { display: none; max-width: 400px; width: 100%; }
    .loading { text-align: center; padding: 3rem; color: #555; }
    .error { text-align: center; padding: 3rem; color: #e74c3c; }

    .status-card {
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .status-card.green {
      background: #162e16;
      border: 1px solid #2a5a2a;
    }
    .status-card.red {
      background: #2e1616;
      border: 1px solid #5a2a2a;
    }
    .status-label {
      font-size: 0.8rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }
    .status-card.green .status-label { color: #4ade80; }
    .status-card.red .status-label { color: #f87171; }

    .timer {
      font-size: 1.5rem; font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .btn {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s ease;
      margin-bottom: 2rem;
    }
    .btn.green-btn {
      background: #22c55e;
      color: #000;
    }
    .btn.green-btn:active { opacity: 0.8; }
    .btn.red-btn {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .log-section h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .log-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.8rem;
    }
    .log-entry .log-date { color: #999; }
    .log-entry .log-ago { color: #555; font-size: 0.7rem; }
    .log-entry:last-child { border-bottom: none; }
    .empty-log { color: #444; font-style: italic; padding: 1rem 0; font-size: 0.8rem; }
    .delete-btn {
      background: none; border: none; color: #444;
      cursor: pointer; font-size: 0.7rem; padding: 0.2rem 0.4rem;
      border-radius: 4px; margin-left: 0.4rem;
    }
    .delete-btn:active { color: #e74c3c; }
    .first-time {
      text-align: center; padding: 2.5rem 1.5rem;
      background: #1a1a1a; border-radius: 16px;
      margin-bottom: 1.25rem; border: 1px solid #252525;
    }
    .first-time h2 { margin-bottom: 0.75rem; font-size: 1.1rem; font-weight: 600; }
    .first-time p { color: #777; margin-bottom: 1rem; font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="denied"><span>404</span></div>
<div id="app"></div>

<script>
const SECRET = 'x9f2k7m4-b8c1-e3a5-d6w0-q7r9s2t4u1v8';
const INTERVAL_MS = 3.5 * 24 * 60 * 60 * 1000;

let entries = [];
let loaded = false;
const API_KEY = `?k=${SECRET}`;

const params = new URLSearchParams(window.location.search);
if (params.get('k') !== SECRET) {
  document.getElementById('denied').style.display = 'flex';
} else {
  document.getElementById('denied').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = '<div class="loading">Loading...</div>';
  init();
}

async function init() {
  try {
    const res = await fetch('/api/entries' + API_KEY);
    if (!res.ok) throw new Error('Server error ' + res.status);
    entries = await res.json();
    loaded = true;
    render();
    setInterval(render, 1000);
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="error">Failed to load: ' + e.message + '</div>';
  }
}

async function logEntry() {
  try {
    const res = await fetch('/api/entries' + API_KEY, { method: 'POST' });
    if (!res.ok) throw new Error('Failed');
    const entry = await res.json();
    entries.push(entry);
    render();
  } catch(e) {
    alert('Failed to save. Try again.');
  }
}

async function deleteEntry(id, index) {
  const original = [...entries];
  entries.splice(index, 1);
  render();
  try {
    const res = await fetch('/api/entries/' + id + API_KEY, { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed');
  } catch(e) {
    entries = original;
    render();
    alert('Failed to delete. Try again.');
  }
}

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const p = n => String(n).padStart(2, '0');
  if (d > 0) return `${d}d ${h}h ${p(m)}m ${p(sec)}s`;
  if (h > 0) return `${h}h ${p(m)}m ${p(sec)}s`;
  return `${m}m ${p(sec)}s`;
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  }) + ', ' + d.toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', hour12: true
  });
}

function ago(ts) {
  const ms = Date.now() - ts;
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d > 0) return `${d}d ${h}h ago`;
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m ago`;
  return `${m}m ago`;
}

function render() {
  if (!loaded) return;
  const app = document.getElementById('app');
  const last = entries.length > 0 ? entries[entries.length - 1] : null;
  let html = '';

  if (!last) {
    html += `
      <div class="first-time">
        <h2>Tic Tac Tracker</h2>
        <p>Twice a week, every 3.5 days.<br>Tap below when you take one.</p>
      </div>
      <button class="btn green-btn" onclick="logEntry()">I took a Tic Tac</button>`;
  } else {
    const elapsed = Date.now() - last.ts;
    if (elapsed >= INTERVAL_MS) {
      html += `
        <div class="status-card green">
          <div class="status-label">Ready</div>
          <div class="timer">${fmt(elapsed)} elapsed</div>
        </div>
        <button class="btn green-btn" onclick="logEntry()">I took a Tic Tac</button>`;
    } else {
      html += `
        <div class="status-card red">
          <div class="status-label">Next dose in</div>
          <div class="timer">${fmt(INTERVAL_MS - elapsed)}</div>
        </div>
        <button class="btn red-btn" disabled>Not yet</button>`;
    }
  }

  html += '<div class="log-section"><h2>History</h2>';
  if (!entries.length) {
    html += '<div class="empty-log">No entries yet.</div>';
  } else {
    for (let i = entries.length - 1; i >= 0; i--) {
      const e = entries[i];
      html += `
        <div class="log-entry">
          <span class="log-date">${fmtDate(e.ts)}</span>
          <span>
            <span class="log-ago">${ago(e.ts)}</span>
            <button class="delete-btn" onclick="deleteEntry(${e.id},${i})">✕</button>
          </span>
        </div>`;
    }
  }
  html += '</div>';
  app.innerHTML = html;
}
</script>
</body>
</html>
