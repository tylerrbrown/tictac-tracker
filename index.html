<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #d4d4d4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    #denied {
      display: flex; align-items: center; justify-content: center;
      height: 80vh; font-size: 2rem; color: #2a2a2a;
    }
    #app { display: none; max-width: 440px; width: 100%; }
    .loading { text-align: center; padding: 3rem; color: #475569; font-size: 1.1rem; }
    .error { text-align: center; padding: 3rem; color: #f43f5e; font-size: 1.1rem; }

    .status-card {
      border-radius: 20px;
      padding: 2.25rem 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .status-card.green {
      background: linear-gradient(135deg, #059669, #10b981, #34d399);
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.3);
    }
    .status-card.wait {
      /* colors set dynamically via inline style */
    }
    .status-label {
      font-size: 1.2rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 0.75rem;
      color: rgba(255,255,255,0.85);
    }
    #timer {
      font-size: 2.4rem; font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    .btn {
      width: 100%;
      padding: 1.3rem;
      font-size: 1.38rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 2rem;
    }
    .btn.green-btn {
      background: #10b981;
      color: #fff;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }
    .btn.green-btn:active { opacity: 0.8; }
    .btn.red-btn {
      background: #2a2a2a;
      color: #6b6b6b;
      cursor: not-allowed;
    }

    .log-section {
      background: #2a2a2a;
      border-radius: 16px;
      padding: 1.1rem 1.25rem;
    }
    .log-section h2 {
      font-size: 0.96rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6b6b6b;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #3a3a3a;
    }
    .log-entry {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.7rem 0;
      border-bottom: 1px solid #3a3a3a;
      font-size: 1.14rem;
    }
    .log-entry .log-date { color: #a3a3a3; white-space: nowrap; font-size: 0.95rem; }
    .log-entry .log-right { display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; margin-left: 0.75rem; }
    .log-entry .log-ago { color: #6b6b6b; font-size: 0.9rem; }
    .log-entry:last-child { border-bottom: none; }
    .empty-log { color: #6b6b6b; font-style: italic; padding: 1rem 0; font-size: 1.14rem; }
    .delete-btn {
      background: none; border: none; color: #6b6b6b;
      cursor: pointer; font-size: 1.02rem; padding: 0.3rem 0.5rem;
      border-radius: 4px; margin-left: 0.5rem;
    }
    .delete-btn:active { color: #f43f5e; }
    .first-time {
      text-align: center; padding: 2.5rem 1.5rem;
      background: #2a2a2a; border-radius: 20px;
      margin-bottom: 1.25rem;
    }
    .first-time h2 { margin-bottom: 0.75rem; font-size: 1.56rem; font-weight: 600; color: #d4d4d4; }
    .first-time p { color: #a3a3a3; margin-bottom: 1rem; font-size: 1.2rem; }
  </style>
</head>
<body>

<div id="denied"><span>404</span></div>
<div id="app"></div>

<script>
const SECRET = 'x9f2k7m4-b8c1-e3a5-d6w0-q7r9s2t4u1v8';
const params = new URLSearchParams(window.location.search);

// Parse tracker name and interval from URL
const TRACKER_NAME = params.get('name') || 'Tic Tac';
const INTERVAL_MS = parseInterval(params.get('interval') || '3.5d');
const CARD_COLOR = params.get('color') || 'orange';

const COLORS = {
  orange: { grad: 'linear-gradient(135deg, #c2410c, #ea580c, #fb923c)', shadow: 'rgba(234, 88, 12, 0.3)', btn: '#ea580c', btnShadow: 'rgba(234, 88, 12, 0.4)' },
  blue:   { grad: 'linear-gradient(135deg, #1d4ed8, #3b82f6, #60a5fa)', shadow: 'rgba(59, 130, 246, 0.3)', btn: '#3b82f6', btnShadow: 'rgba(59, 130, 246, 0.4)' },
  red:    { grad: 'linear-gradient(135deg, #b91c1c, #dc2626, #ef4444)', shadow: 'rgba(220, 38, 38, 0.3)', btn: '#dc2626', btnShadow: 'rgba(220, 38, 38, 0.4)' },
  purple: { grad: 'linear-gradient(135deg, #7c3aed, #8b5cf6, #a78bfa)', shadow: 'rgba(139, 92, 246, 0.3)', btn: '#8b5cf6', btnShadow: 'rgba(139, 92, 246, 0.4)' },
  teal:   { grad: 'linear-gradient(135deg, #0d9488, #14b8a6, #2dd4bf)', shadow: 'rgba(20, 184, 166, 0.3)', btn: '#14b8a6', btnShadow: 'rgba(20, 184, 166, 0.4)' },
  pink:   { grad: 'linear-gradient(135deg, #be185d, #ec4899, #f472b6)', shadow: 'rgba(236, 72, 153, 0.3)', btn: '#ec4899', btnShadow: 'rgba(236, 72, 153, 0.4)' },
};
const CC = COLORS[CARD_COLOR] || COLORS.orange;

function parseInterval(str) {
  const m = str.match(/^([\d.]+)\s*(d|h|m|w)$/i);
  if (!m) return 3.5 * 24 * 60 * 60 * 1000; // default 3.5 days
  const val = parseFloat(m[1]);
  switch (m[2].toLowerCase()) {
    case 'w': return val * 7 * 24 * 60 * 60 * 1000;
    case 'd': return val * 24 * 60 * 60 * 1000;
    case 'h': return val * 60 * 60 * 1000;
    case 'm': return val * 60 * 1000;
    default: return val * 24 * 60 * 60 * 1000;
  }
}

function fmtInterval() {
  const days = INTERVAL_MS / (24 * 60 * 60 * 1000);
  if (days >= 7 && days % 7 === 0) return (days / 7) + (days / 7 === 1 ? ' week' : ' weeks');
  if (days >= 1) return days + (days === 1 ? ' day' : ' days');
  const hours = INTERVAL_MS / (60 * 60 * 1000);
  if (hours >= 1) return hours + (hours === 1 ? ' hour' : ' hours');
  const mins = INTERVAL_MS / (60 * 1000);
  return mins + (mins === 1 ? ' minute' : ' minutes');
}

let entries = [];
const nameParam = params.get('name') ? `&name=${encodeURIComponent(params.get('name'))}` : '';
const API_PARAMS = `?k=${SECRET}${nameParam}`;

document.title = TRACKER_NAME + ' Tracker';

if (params.get('k') !== SECRET) {
  document.getElementById('denied').style.display = 'flex';
} else {
  document.getElementById('denied').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = '<div class="loading">Loading...</div>';
  init();
}

async function init() {
  try {
    const res = await fetch('/api/entries' + API_PARAMS);
    if (!res.ok) throw new Error('Server error ' + res.status);
    entries = await res.json();
    renderFull();
    setInterval(tickTimer, 1000);
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="error">Failed to load: ' + e.message + '</div>';
  }
}

let saving = false;

async function logEntry() {
  if (saving) return;
  saving = true;
  const btn = document.querySelector('.green-btn');
  if (btn) { btn.textContent = 'Saving...'; btn.style.opacity = '0.6'; }
  try {
    const res = await fetch('/api/entries' + API_PARAMS, { method: 'POST' });
    if (!res.ok) throw new Error('Failed');
    const entry = await res.json();
    entries.push(entry);
    renderFull();
  } catch(e) {
    if (btn) { btn.textContent = 'Failed — tap to retry'; btn.style.opacity = '1'; }
  }
  saving = false;
}

async function deleteEntry(id, index) {
  const original = [...entries];
  entries.splice(index, 1);
  renderFull();
  try {
    const res = await fetch('/api/entries/' + id + API_PARAMS, { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed');
  } catch(e) {
    entries = original;
    renderFull();
  }
}

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const p = n => String(n).padStart(2, '0');
  if (d > 0) return `${d}d ${h}h ${p(m)}m ${p(sec)}s`;
  if (h > 0) return `${h}h ${p(m)}m ${p(sec)}s`;
  return `${m}m ${p(sec)}s`;
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  }) + ', ' + d.toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', hour12: true
  });
}

function ago(ts) {
  const ms = Date.now() - ts;
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d > 0) return `${d}d ${h}h ago`;
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m ago`;
  return `${m}m ago`;
}

// Only updates the timer text — no DOM rebuild
function tickTimer() {
  const el = document.getElementById('timer');
  if (!el || !entries.length) return;
  const last = entries[entries.length - 1];
  const elapsed = Date.now() - last.ts;
  if (elapsed >= INTERVAL_MS) {
    el.textContent = fmt(elapsed) + ' elapsed';
    // Switch card to green if it was red
    const card = el.closest('.status-card');
    if (card && card.classList.contains('wait')) renderFull();
  } else {
    el.textContent = fmt(INTERVAL_MS - elapsed);
  }
  // Update ago times
  document.querySelectorAll('.log-ago').forEach((el, idx) => {
    const e = entries[entries.length - 1 - idx];
    if (e) el.textContent = ago(e.ts);
  });
}

// Full rebuild — only on data changes
function renderFull() {
  const app = document.getElementById('app');
  const last = entries.length > 0 ? entries[entries.length - 1] : null;
  let html = '';

  if (!last) {
    html += `
      <div class="first-time">
        <h2>${TRACKER_NAME} Tracker</h2>
        <p>Every ${fmtInterval()}.<br>Tap below when you take one.</p>
      </div>
      <button class="btn green-btn" style="background:${CC.btn};box-shadow:0 4px 20px ${CC.btnShadow}" onclick="logEntry()">I took a ${TRACKER_NAME}</button>`;
  } else {
    const elapsed = Date.now() - last.ts;
    if (elapsed >= INTERVAL_MS) {
      html += `
        <div class="status-card green">
          <div class="status-label">Ready</div>
          <div id="timer">${fmt(elapsed)} elapsed</div>
        </div>
        <button class="btn green-btn" style="background:${CC.btn};box-shadow:0 4px 20px ${CC.btnShadow}" onclick="logEntry()">I took a ${TRACKER_NAME}</button>`;
    } else {
      html += `
        <div class="status-card wait" style="background:${CC.grad};box-shadow:0 8px 30px ${CC.shadow}">
          <div class="status-label">Next ${TRACKER_NAME} in</div>
          <div id="timer">${fmt(INTERVAL_MS - elapsed)}</div>
        </div>
        <button class="btn red-btn" disabled>Not yet</button>`;
    }
  }

  html += '<div class="log-section"><h2>History</h2>';
  if (!entries.length) {
    html += '<div class="empty-log">No entries yet.</div>';
  } else {
    for (let i = entries.length - 1; i >= 0; i--) {
      const e = entries[i];
      html += `
        <div class="log-entry">
          <span class="log-date">${fmtDate(e.ts)}</span>
          <span class="log-right">
            <span class="log-ago">${ago(e.ts)}</span>
            <button class="delete-btn" onclick="deleteEntry(${e.id},${i})">✕</button>
          </span>
        </div>`;
    }
  }
  html += '</div>';
  app.innerHTML = html;
}
</script>
</body>
</html>
